services:
  postgres:
    image: postgres:16-alpine
    container_name: diploma-postgres
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diploma-backend
    environment:
      DB_PASSWORD: postgres
      AUTH_SIGNING_KEY: local-dev-signing-key
    volumes:
      - ./docker/config.yml:/app/internal/configs/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    container_name: diploma-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
